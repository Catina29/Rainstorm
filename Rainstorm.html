<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>高压任务管理器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0b0f19;
  --card: #151b2b;
  --card-border: #2a3447;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --pressure: 0;
  --pressure-opacity: 0;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: filter 0.5s ease;
}
.pressure-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 50%, #7f1d1d 100%);
  opacity: var(--pressure-opacity);
  pointer-events: none;
  z-index: 9998;
  mix-blend-mode: multiply;
  transition: opacity 0.8s ease;
}
.pressure-vignette {
  position: fixed;
  inset: 0;
  box-shadow: inset 0 0 150px rgba(220, 38, 38, var(--pressure-opacity));
  pointer-events: none;
  z-index: 9997;
  transition: box-shadow 0.8s ease;
}
.emergency-banner {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: linear-gradient(90deg, #dc2626, #b91c1c, #dc2626);
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
  font-size: 14px;
  z-index: 10000;
  transform: translateY(-100%);
  transition: transform 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.emergency-banner.active {
  transform: translateY(0);
}
.emergency-banner::before {
  content: "⚠️";
  animation: blink 1s infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 16px 100px;
  position: relative;
  z-index: 1;
}
header {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 24px;
  padding-top: 8px;
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
h1 {
  font-size: 24px;
  font-weight: 800;
  background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.pressure-gauge {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.gauge-circle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: conic-gradient(
    var(--success) 0% 30%,
    var(--warning) 30% 60%,
    var(--danger) 60% 100%
  );
  position: relative;
  flex-shrink: 0;
  display: grid;
  place-items: center;
}
.gauge-circle::before {
  content: "";
  position: absolute;
  inset: 6px;
  background: var(--card);
  border-radius: 50%;
}
.gauge-value {
  position: relative;
  font-size: 18px;
  font-weight: 800;
  z-index: 2;
}
.gauge-info {
  flex: 1;
}
.gauge-label {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.gauge-status {
  font-size: 16px;
  font-weight: 700;
}
.gauge-bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  margin-top: 8px;
  overflow: hidden;
}
.gauge-bar-fill {
  height: 100%;
  width: calc(var(--pressure) * 1%);
  background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
  transition: width 0.6s ease;
  border-radius: 3px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color: white;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}
.btn-primary:hover { box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4); }
.btn-success {
  background: linear-gradient(135deg, #10b981, #059669);
  color: white;
}
.btn-danger {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  animation: pulse-btn 1.5s infinite;
}
@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
  50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
}
.btn-ghost {
  background: rgba(255,255,255,0.05);
  color: var(--text-dim);
  border: 1px solid var(--card-border);
}
.tasks-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.task-card {
  background: var(--card);
  border: 2px solid var(--card-border);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  transition: all 0.3s ease;
}
.task-card.overdue {
  border-color: rgba(239, 68, 68, 0.5);
  background: linear-gradient(135deg, #151b2b 0%, #1f1515 100%);
}
.task-card.done {
  opacity: 0.7;
  border-color: rgba(16, 185, 129, 0.4);
}
.task-card.critical {
  animation: card-shake 0.4s infinite;
  border-color: #dc2626 !important;
  box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
}
@keyframes card-shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-1px); }
  75% { transform: translateX(1px); }
}
.task-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.task-title {
  font-size: 17px;
  font-weight: 700;
  line-height: 1.4;
  flex: 1;
  padding-right: 8px;
}
.task-badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 700;
  white-space: nowrap;
}
.badge-urgent {
  background: rgba(239, 68, 68, 0.15);
  color: #fca5a5;
  border: 1px solid rgba(239, 68, 68, 0.3);
}
.badge-soon {
  background: rgba(245, 158, 11, 0.15);
  color: #fcd34d;
  border: 1px solid rgba(245, 158, 11, 0.3);
}
.badge-done {
  background: rgba(16, 185, 129, 0.15);
  color: #6ee7b7;
  border: 1px solid rgba(16, 185, 129, 0.3);
}
.task-meta {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 16px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.progress-section {
  margin-bottom: 16px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  margin-bottom: 8px;
  color: var(--text-dim);
}
.progress-track {
  width: 100%;
  height: 28px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
}
.progress-grid {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    rgba(255,255,255,0.08) 0px,
    rgba(255,255,255,0.08) 1px,
    transparent 1px,
    transparent calc(1%)
  );
  z-index: 2;
  pointer-events: none;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ef4444 0%, #f59e0b 60%, #10b981 100%);
  background-size: 100% 100%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  z-index: 1;
}
.progress-fill::after {
  content: "";
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
}
.task-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn-small {
  padding: 8px 14px;
  font-size: 13px;
  border-radius: 10px;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-state-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.modal {
  position: fixed;
  inset: 0;
  z-index: 10001;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal.active {
  display: flex;
}
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
}
.modal-content {
  background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
  border: 1px solid #334155;
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  padding: 24px;
  animation: slide-up 0.3s ease;
}
@keyframes slide-up {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.modal-title {
  font-size: 20px;
  font-weight: 700;
}
.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.1);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: grid;
  place-items: center;
}
.form-group {
  margin-bottom: 20px;
}
.form-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text-dim);
}
.form-input, .form-textarea {
  width: 100%;
  padding: 12px 16px;
  background: rgba(0,0,0,0.3);
  border: 1px solid #334155;
  border-radius: 12px;
  color: var(--text);
  font-size: 15px;
  font-family: inherit;
  -webkit-appearance: none;
}
.form-input:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--accent);
}
.form-textarea {
  min-height: 100px;
  resize: vertical;
}
.form-hint {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 6px;
}
.range-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.range-value {
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  min-width: 48px;
  text-align: center;
}
input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(99,102,241,0.5);
}
.photo-upload {
  border: 2px dashed #334155;
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.photo-upload:hover {
  border-color: var(--accent);
  background: rgba(99,102,241,0.05);
}
.photo-upload input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.photo-preview {
  max-width: 100%;
  max-height: 200px;
  border-radius: 12px;
  margin-top: 12px;
  display: none;
}
.photo-preview.active {
  display: block;
}
.records-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.record-item {
  background: rgba(0,0,0,0.2);
  border: 1px solid #334155;
  border-radius: 16px;
  padding: 16px;
}
.record-date {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
.record-progress {
  font-size: 13px;
  color: var(--success);
  font-weight: 700;
}
.record-text {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 8px;
  white-space: pre-wrap;
}
.record-photo {
  max-width: 100%;
  border-radius: 12px;
  border: 1px solid #334155;
}
.warning-modal .modal-content {
  border-color: #dc2626;
  background: linear-gradient(180deg, #450a0a 0%, #1f1515 100%);
}
.warning-text {
  color: #fca5a5;
  line-height: 1.8;
  font-size: 15px;
  margin-bottom: 20px;
}
.consequence-box {
  background: rgba(220, 38, 38, 0.15);
  border: 1px solid rgba(220, 38, 38, 0.4);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 20px;
}
.consequence-title {
  font-weight: 700;
  color: #fca5a5;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.consequence-list {
  list-style: none;
  font-size: 14px;
  color: #fecaca;
}
.consequence-list li {
  padding: 4px 0;
  padding-left: 20px;
  position: relative;
}
.consequence-list li::before {
  content: "×";
  position: absolute;
  left: 0;
  color: #ef4444;
  font-weight: bold;
}
.fab {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color: white;
  border: none;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
  z-index: 100;
  display: grid;
  place-items: center;
  transition: transform 0.2s;
}
.fab:active { transform: scale(0.9); }
.delete-btn {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: rgba(239, 68, 68, 0.1);
  color: #ef4444;
  cursor: pointer;
  font-size: 16px;
  display: grid;
  place-items: center;
  opacity: 0.6;
  transition: opacity 0.2s;
}
.delete-btn:hover { opacity: 1; }
.alert-box {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  color: #fca5a5;
  display: none;
  align-items: center;
  gap: 8px;
}
.alert-box.active { display: flex; }
@media (min-width: 640px) {
  .modal { align-items: center; }
  .modal-content { border-radius: 24px; max-height: 85vh; }
}
@media (max-width: 640px) {
  h1 { font-size: 20px; }
  .container { padding: 16px 12px 100px; }
  .task-card { padding: 16px; }
  .gauge-circle { width: 56px; height: 56px; }
}
</style>
</head>
<body>
<div class="pressure-overlay"></div>
<div class="pressure-vignette"></div>
<div class="emergency-banner" id="emergencyBanner">
  系统警告：任务严重滞后！立即行动！
</div>

<div class="container">
  <header>
    <div class="header-top">
      <h1>🔥 高压任务管理器</h1>
    </div>
    <div class="alert-box" id="consequenceAlert">
      <span>🔴</span>
      <span id="consequenceText">你有多项任务今日未汇报，系统压力持续累积中！</span>
    </div>
    <div class="pressure-gauge">
      <div class="gauge-circle">
        <div class="gauge-value" id="gaugeValue">0</div>
      </div>
      <div class="gauge-info">
        <div class="gauge-label">当前压力指数</div>
        <div class="gauge-status" id="gaugeStatus">状态正常</div>
        <div class="gauge-bar">
          <div class="gauge-bar-fill" id="gaugeBarFill"></div>
        </div>
      </div>
    </div>
  </header>

  <main id="tasksContainer" class="tasks-list"></main>
  
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-state-icon">📋</div>
    <div>暂无任务，点击右下角添加</div>
  </div>
</div>

<button class="fab" onclick="openAddModal()">+</button>

<div class="modal" id="addModal">
  <div class="modal-backdrop" onclick="closeAddModal()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">添加新任务</div>
      <button class="modal-close" onclick="closeAddModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">任务名称</label>
      <input type="text" class="form-input" id="addTitle" placeholder="输入任务名称..." maxlength="100">
    </div>
    <div class="form-group">
      <label class="form-label">截止日期</label>
      <input type="datetime-local" class="form-input" id="addDeadline">
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="submitAddTask()">添加任务</button>
  </div>
</div>

<div class="modal" id="reportModal">
  <div class="modal-backdrop" onclick="closeReportModal()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="reportTaskTitle">汇报任务</div>
      <button class="modal-close" onclick="closeReportModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">今日进度增加（格数）</label>
      <div class="range-row">
        <input type="range" id="reportProgress" min="1" max="50" value="10" oninput="updateRangeValue(this.value)">
        <div class="range-value" id="rangeValue">10</div>
      </div>
      <div class="form-hint">建议每次汇报10-20格，过少会触发压力警告</div>
    </div>
    <div class="form-group">
      <label class="form-label">成果说明</label>
      <textarea class="form-textarea" id="reportText" placeholder="详细描述今日完成的任务内容..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">照片证明（可选）</label>
      <div class="photo-upload" onclick="document.getElementById('reportPhoto').click()">
        <div>📷 点击上传照片</div>
        <div class="form-hint">支持 JPG/PNG，会自动压缩</div>
        <input type="file" id="reportPhoto" accept="image/*" onchange="previewPhoto(this)">
        <img class="photo-preview" id="photoPreview">
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;" onclick="submitReport()">提交汇报</button>
  </div>
</div>

<div class="modal" id="recordsModal">
  <div class="modal-backdrop" onclick="closeRecordsModal()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="recordsTaskTitle">汇报记录</div>
      <button class="modal-close" onclick="closeRecordsModal()">×</button>
    </div>
    <div id="recordsList" class="records-list"></div>
  </div>
</div>

<div class="modal warning-modal" id="warningModal">
  <div class="modal-backdrop" onclick="closeWarningModal()"></div>
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">⚠️ 敷衍警告</div>
      <button class="modal-close" onclick="closeWarningModal()">×</button>
    </div>
    <div class="warning-text">
      系统检测到你在极度压力下仅增加了极少进度！<<br>
      这种敷衍的汇报无法缓解系统压力！
    </div>
    <div class="consequence-box">
      <div class="consequence-title">继续拖延的后果：</div>
      <ul class="consequence-list">
        <li>页面将持续保持深红警告状态</li>
        <li>所有任务卡片进入震动警报模式</li>
        <li>系统将在后台记录你的懈怠行为</li>
        <li>截止日期临近时惩罚将加倍</li>
      </ul>
    </div>
    <button class="btn btn-danger" style="width:100%;" onclick="closeWarningModal()">我知道了，立即认真完成</button>
  </div>
</div>

<script>
let tasks = [];
let currentReportTaskId = null;
const STORAGE_KEY = 'pressureTaskManager_v2';

function getInitialTasks() {
  const now = new Date();
  const y = now.getFullYear();
  const pad = n => String(n).padStart(2, '0');
  const mk = (m, d, h, min) => `${y}-${pad(m)}-${pad(d)}T${pad(h)}:${pad(min)}`;
  return [
    { id: Date.now()+1, title: "给妈妈发健身video", deadline: mk(6,8,12,0), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+2, title: "拍面试视频", deadline: mk(6,11,14,0), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+3, title: "错题本出成果", deadline: mk(6,12,22,30), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+4, title: "补完文亮英语作业", deadline: mk(6,13,22,30), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+5, title: "挑好父亲节礼物", deadline: mk(6,14,20,0), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+6, title: "做好十页百科全书内容", deadline: mk(6,17,23,59), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+7, title: "做好公司调研", deadline: mk(6,17,23,59), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+8, title: "完成月考核", deadline: mk(6,19,23,59), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+9, title: "考科目一", deadline: mk(6,20,23,59), progress: 0, reports: [], createdAt: now.toISOString() },
    { id: Date.now()+10, title: "构思三下乡项目", deadline: mk(6,30,23,59), progress: 0, reports: [], createdAt: now.toISOString() }
  ];
}

function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try { tasks = JSON.parse(saved); } catch(e) { tasks = getInitialTasks(); }
  } else {
    tasks = getInitialTasks();
  }
  if (!Array.isArray(tasks)) tasks = getInitialTasks();
  render();
  updatePressure();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {
    alert('保存失败，可能存储空间已满，请删除部分图片记录');
  }
}

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateTime(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}月${d.getDate()}日 ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function getDeadlineStatus(deadline, progress) {
  const now = new Date();
  const dl = new Date(deadline);
  const diff = dl - now;
  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor(diff / (1000*60*60));
  
  if (progress >= 100) return { text: '已完成', class: 'badge-done', overdue: false };
  if (diff < 0) return { text: `已逾期${Math.abs(days)}天`, class: 'badge-urgent', overdue: true };
  if (hours < 24) return { text: `仅剩${hours}小时`, class: 'badge-urgent', overdue: false };
  if (days <= 2) return { text: `剩${days}天`, class: 'badge-soon', overdue: false };
  return { text: `剩${days}天`, class: 'badge-done', overdue: false };
}

function calculatePressure() {
  let pressure = 0;
  const now = new Date();
  const todayStr = getTodayStr();
  
  if (tasks.length === 0) return 0;
  
  tasks.forEach(task => {
    if (task.progress >= 100) return;
    
    const dl = new Date(task.deadline);
    const hasToday = task.reports.some(r => r.date === todayStr);
    
    if (!hasToday) pressure += 12;
    
    if (now > dl) {
      const daysOver = Math.floor((now - dl) / (1000*60*60*24));
      pressure += daysOver * 10;
    }
    
    const created = new Date(task.createdAt);
    const totalDays = Math.max(1, Math.floor((dl - created) / (1000*60*60*24)));
    const elapsed = Math.max(0, Math.floor((now - created) / (1000*60*60*24)));
    const expected = Math.min(100, (elapsed / totalDays) * 100);
    if (elapsed > 0 && task.progress < expected * 0.5) {
      pressure += 8;
    }
    
    if (hasToday) {
      const todayRep = task.reports.find(r => r.date === todayStr);
      if (todayRep && todayRep.progressAdded < 5) {
        pressure += 10;
      }
    }
  });
  
  return Math.min(100, Math.floor(pressure));
}

function updatePressure() {
  const p = calculatePressure();
  document.documentElement.style.setProperty('--pressure', p);
  document.documentElement.style.setProperty('--pressure-opacity', (p / 100 * 0.85).toFixed(2));
  
  const gaugeValue = document.getElementById('gaugeValue');
  const gaugeStatus = document.getElementById('gaugeStatus');
  const gaugeBarFill = document.getElementById('gaugeBarFill');
  const emergencyBanner = document.getElementById('emergencyBanner');
  const consequenceAlert = document.getElementById('consequenceAlert');
  const consequenceText = document.getElementById('consequenceText');
  
  gaugeValue.textContent = p;
  gaugeBarFill.style.width = p + '%';
  
  let status = '状态正常';
  if (p === 0) status = '状态完美';
  else if (p < 30) status = '轻微压力';
  else if (p < 50) status = '压力上升';
  else if (p < 70) status = '压力警告';
  else if (p < 90) status = '高压危险';
  else if (p < 100) status = '极度危险';
  else status = '系统崩溃边缘';
  
  gaugeStatus.textContent = status;
  gaugeStatus.style.color = p > 60 ? '#fca5a5' : (p > 30 ? '#fcd34d' : '#6ee7b7');
  
  if (p >= 100) {
    emergencyBanner.classList.add('active');
    document.body.classList.add('critical-mode');
  } else {
    emergencyBanner.classList.remove('active');
    document.body.classList.remove('critical-mode');
  }
  
  const unreported = tasks.filter(t => t.progress < 100 && !t.reports.some(r => r.date === getTodayStr()));
  if (p >= 80 && unreported.length > 0) {
    consequenceAlert.classList.add('active');
    const names = unreported.slice(0,2).map(t => `「${t.title}」`).join('、');
    consequenceText.textContent = `你还有 ${unreported.length} 项任务今日未汇报（${names}等），系统压力已达 ${p}%！`;
  } else {
    consequenceAlert.classList.remove('active');
  }
  
  document.querySelectorAll('.task-card').forEach((card, idx) => {
    const task = tasks[idx];
    if (!task) return;
    const hasToday = task.reports.some(r => r.date === getTodayStr());
    if (p >= 100 && !hasToday && task.progress < 100) {
      card.classList.add('critical');
    } else {
      card.classList.remove('critical');
    }
  });
}

function render() {
  const container = document.getElementById('tasksContainer');
  const empty = document.getElementById('emptyState');
  
  if (tasks.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  const todayStr = getTodayStr();
  
  container.innerHTML = tasks.map(task => {
    const status = getDeadlineStatus(task.deadline, task.progress);
    const hasToday = task.reports.some(r => r.date === todayStr);
    const isDone = task.progress >= 100;
    
    let btnClass = 'btn-primary';
    let btnText = '今日汇报';
    if (isDone) { btnClass = 'btn-success'; btnText = '已完成'; }
    else if (hasToday) { btnClass = 'btn-success'; btnText = '今日已汇报 ✓'; }
    else if (status.overdue) { btnClass = 'btn-danger'; btnText = '立即汇报！'; }
    
    const unreportedWarn = (!isDone && !hasToday) ? `<div style="color:#ef4444;font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:4px;">🔴 今日未汇报！压力持续上升中...</div>` : '';
    
    return `
    <div class="task-card ${status.overdue ? 'overdue' : ''} ${isDone ? 'done' : ''}">
      <div class="task-header">
        <div class="task-title">${escapeHtml(task.title)}</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="task-badge ${status.class}">${status.text}</span>
          <button class="delete-btn" onclick="deleteTask(${task.id})">×</button>
        </div>
      </div>
      <div class="task-meta">
        <span>📅 截止：${formatDateTime(task.deadline)}</span>
        <span>📊 当前：${task.progress}/100</span>
      </div>
      ${unreportedWarn}
      <div class="progress-section">
        <div class="progress-label">
          <span>进度条（100格）</span>
          <span>${task.progress}%</span>
        </div>
        <div class="progress-track">
          <div class="progress-grid"></div>
          <div class="progress-fill" style="width:${task.progress}%"></div>
        </div>
      </div>
      <div class="task-actions">
        <button class="btn ${btnClass} btn-small" onclick="openReportModal(${task.id})" ${isDone ? 'disabled style="opacity:0.6;cursor:not-allowed;"' : ''}>
          ${btnText}
        </button>
        <button class="btn btn-ghost btn-small" onclick="openRecordsModal(${task.id})">
          📋 查看记录 (${task.reports.length})
        </button>
      </div>
    </div>
    `;
  }).join('');
  
  updatePressure();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function openAddModal() {
  document.getElementById('addModal').classList.add('active');
  const now = new Date();
  now.setDate(now.getDate() + 1);
  const pad = n => String(n).padStart(2,'0');
  const localIso = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById('addDeadline').value = localIso;
  setTimeout(() => document.getElementById('addTitle').focus(), 100);
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
  document.getElementById('addTitle').value = '';
}

function submitAddTask() {
  const title = document.getElementById('addTitle').value.trim();
  const deadline = document.getElementById('addDeadline').value;
  if (!title) { alert('请输入任务名称'); return; }
  if (!deadline) { alert('请选择截止日期'); return; }
  
  tasks.push({
    id: Date.now(),
    title,
    deadline: new Date(deadline).toISOString(),
    progress: 0,
    reports: [],
    createdAt: new Date().toISOString()
  });
  save();
  render();
  closeAddModal();
}

function deleteTask(id) {
  if (!confirm('确定要删除这个任务吗？所有汇报记录也将被删除。')) return;
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function openReportModal(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || task.progress >= 100) return;
  
  currentReportTaskId = taskId;
  document.getElementById('reportTaskTitle').textContent = '汇报：' + task.title;
  document.getElementById('reportProgress').value = 10;
  document.getElementById('rangeValue').textContent = '10';
  document.getElementById('reportText').value = '';
  document.getElementById('reportPhoto').value = '';
  document.getElementById('photoPreview').classList.remove('active');
  document.getElementById('photoPreview').src = '';
  document.getElementById('reportModal').classList.add('active');
}

function closeReportModal() {
  document.getElementById('reportModal').classList.remove('active');
  currentReportTaskId = null;
}

function updateRangeValue(v) {
  document.getElementById('rangeValue').textContent = v;
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('photoPreview');
    img.src = e.target.result;
    img.classList.add('active');
  };
  reader.readAsDataURL(file);
}

function compressImage(base64, maxWidth=800, quality=0.6) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = base64;
  });
}

async function submitReport() {
  if (!currentReportTaskId) return;
  const task = tasks.find(t => t.id === currentReportTaskId);
  if (!task) return;
  
  const progressAdded = parseInt(document.getElementById('reportProgress').value);
  const text = document.getElementById('reportText').value.trim();
  const fileInput = document.getElementById('reportPhoto');
  
  if (!text) { alert('请填写成果说明'); return; }
  
  let photoBase64 = '';
  if (fileInput.files[0]) {
    const reader = new FileReader();
    const fileData = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(fileInput.files[0]);
    });
    photoBase64 = await compressImage(fileData);
  }
  
  const todayStr = getTodayStr();
  
  const existingIdx = task.reports.findIndex(r => r.date === todayStr);
  const reportData = {
    date: todayStr,
    text,
    photo: photoBase64,
    progressAdded,
    timestamp: new Date().toISOString()
  };
  
  if (existingIdx >= 0) {
    const oldAdded = task.reports[existingIdx].progressAdded;
    task.progress = Math.min(100, task.progress - oldAdded + progressAdded);
    task.reports[existingIdx] = reportData;
  } else {
    task.reports.push(reportData);
    task.progress = Math.min(100, task.progress + progressAdded);
  }
  
  const currentPressure = calculatePressure();
  
  save();
  render();
  closeReportModal();
  
  if (currentPressure >= 100 && progressAdded < 5 && task.progress < 100) {
    setTimeout(() => {
      document.getElementById('warningModal').classList.add('active');
    }, 300);
  }
}

function closeWarningModal() {
  document.getElementById('warningModal').classList.remove('active');
}

function openRecordsModal(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  
  document.getElementById('recordsTaskTitle').textContent = task.title + ' - 汇报记录';
  const list = document.getElementById('recordsList');
  
  if (task.reports.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:40px 0;">暂无汇报记录</div>';
  } else {
    list.innerHTML = task.reports.slice().reverse().map(r => `
      <div class="record-item">
        <div class="record-date">
          <span>${r.date}</span>
          <span class="record-progress">+${r.progressAdded}格</span>
        </div>
        <div class="record-text">${escapeHtml(r.text)}</div>
        ${r.photo ? `<img class="record-photo" src="${r.photo}" onclick="window.open(this.src)">` : ''}
      </div>
    `).join('');
  }
  
  document.getElementById('recordsModal').classList.add('active');
}

function closeRecordsModal() {
  document.getElementById('recordsModal').classList.remove('active');
}

document.querySelectorAll('.modal-content').forEach(el => {
  el.addEventListener('click', e => e.stopPropagation());
});

init();

setInterval(() => {
  updatePressure();
}, 60000);
</script>
